<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruta Estratégica CESDE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --yellow: #FFC000;
      --black: #111111;
      --white: #ffffff;
      --gray: #6b6b6b;
      --line: rgba(17, 17, 17, 0.08);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, #ffffff 0%, #f4f4f4 100%);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 42px;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--yellow);
      color: var(--black);
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 700;
      margin-bottom: 22px;
    }

    h1 {
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 0.95;
      text-transform: uppercase;
      letter-spacing: -1.5px;
      margin-bottom: 16px;
    }

    p {
      color: var(--gray);
      font-size: 1.05rem;
      line-height: 1.75;
      margin-bottom: 26px;
    }

    .actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border-radius: 999px;
      padding: 15px 24px;
      font-weight: 600;
      transition: transform 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: var(--black);
      color: var(--yellow);
    }

    .btn-secondary {
      background: var(--white);
      color: var(--black);
      border: 1px solid var(--line);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">CESDE · Ruta Estratégica</div>
    <h1>Cargando documento</h1>
    <p>
      Estamos abriendo la versión completa de la Ruta Estratégica.
      Si no se redirige automáticamente, usa el botón principal.
    </p>
    <div class="actions">
      <a
        class="btn btn-primary"
        href="https://htmlpreview.github.io/?https://github.com/DanielAdcom98/Cesde/blob/51556f497db075e7c80ab9409e6821ec40c520cd/index.html">
        Abrir ruta completa
      </a>
      <a class="btn btn-secondary" href="./index.html">
        Volver al índice
      </a>
    </div>
  </main>

  <script>
    const target = 'https://htmlpreview.github.io/?https://github.com/DanielAdcom98/Cesde/blob/51556f497db075e7c80ab9409e6821ec40c520cd/index.html';
    window.location.replace(target);
  </script>
</body>
</html>
